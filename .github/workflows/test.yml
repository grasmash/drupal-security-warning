name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }} (${{ matrix.dependencies }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        dependencies: [highest]
        include:
          - php: '8.1'
            dependencies: lowest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-all --ansi

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: ${{ matrix.dependencies }}

      - name: Run tests
        run: composer test

  coverage:
    name: Coverage (100% gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: pcov

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run unit tests with coverage
        run: vendor/bin/phpunit --filter PluginUnitTest --coverage-text --colors=never | tee coverage.txt

      - name: Enforce 100% line coverage
        run: grep -Eq 'Lines:\s+100\.00%' coverage.txt
